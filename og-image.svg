<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A3E635"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#A3E635" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#09090B"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark (scaled from logo.svg, centered-left) -->
  <g transform="translate(120 215) scale(4)">
    <rect x="0" y="4" width="28" height="6" rx="3" fill="url(#barGrad)"/>
    <circle cx="36" cy="7" r="3" fill="#A3E635"/>
    <rect x="0" y="17" width="48" height="6" rx="3" fill="url(#barGrad)"/>
    <circle cx="56" cy="20" r="3" fill="#A3E635"/>
    <rect x="0" y="30" width="68" height="6" rx="3" fill="url(#barGrad)"/>
    <circle cx="76" cy="33" r="3" fill="#A3E635"/>
  </g>

  <!-- Wordmark & copy -->
  <text x="560" y="290" fill="#F4F4F5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="600" letter-spacing="-2">Lawenots</text>
  <text x="560" y="360" fill="#A1A1AA" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="400">Infrastructure, evolved.</text>
  <text x="560" y="410" fill="#71717A" font-family="ui-monospace, 'Cascadia Mono', monospace" font-size="18" font-weight="400" letter-spacing="2">PLATFORM · WEB · GROWTH</text>
</svg>
